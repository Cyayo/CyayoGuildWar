# ┌──────────────────────────────────────────────────┐
# │              CYAYOGUILDWAR MAIN CONFIG           │
# └──────────────────────────────────────────────────┘

# Opsi penyimpanan data: YAML (data.yml) atau SQLITE
database:
  type: "YAML" # YAML atau SQLITE
  sqlite-file: "database.db"

# Pengaturan Perang
war-settings:
  # Durasi persiapan sebelum war dimulai (dalam detik)
  # Setelah timer ini habis, pemain akan diteleportasi ke arena
  preparation-time-seconds: 60
  # Durasi maksimum pertempuran di arena (dalam detik) sebelum otomatis dianggap seri/selesai
  max-war-duration-seconds: 600
  # Jumlah minimum pemain dari masing-masing guild untuk memulai teleportasi ke arena
  min-players-per-guild: 1
  # Jumlah maksimum pemain dari masing-masing guild yang boleh ikut bertarung di arena
  max-players-per-guild: 5

  # Efek glow (bercahaya) pada pemain yang bertarung di arena war
  glow-effect: true
  # Pilihan warna glow (RED, BLUE, GREEN, GOLD, dll - menggunakan ChatColor Minecraft)
  glow-color-attacker: "RED"
  glow-color-defender: "BLUE"

  # Aturan drop item saat mati di arena war (Bypass/Override CyayoDeathPenalty & CyayoPvP)
  # true = Item pemain akan drop/jatuh di lantai arena war saat mati
  # false = Keep Inventory aktif (tidak ada item/armor yang hilang di arena)
  drop-items-on-death: false

  # Jika true, inventory player akan dikembalikan persis ke kondisi awal sebelum war dimulai.
  # Jika false, perubahan inventory selama bertarung (seperti totem pecah, ramuan habis) akan tetap tersimpan permanen.
  restore-inventory-after-war: false

  # Durasi selebrasi kembang api setelah war selesai sebelum pemain diteleportasi pulang (dalam detik)
  celebration-time-seconds: 10

  # Jumlah maksimum teritori yang boleh diserang/war aktif oleh satu Guild secara bersamaan
  max-simultaneous-attacks-per-guild: 1

  # Sistem Sudden Death (Meningkatkan efek Strength agar war cepat selesai)
  sudden-death:
    enabled: true
    # Penambahan efek Strength setiap X detik (60 detik = 1 menit)
    interval-seconds: 60
    # Level Strength awal saat war dimulai (0 = tidak ada Strength bawaan)
    start-level: 0

# ┌──────────────────────────────────────────────────┐
# │              PERSYARATAN PANGAT/RANK GUILD       │
# └──────────────────────────────────────────────────┘
# Atur pangkat apa saja yang diizinkan melakukan aksi teritori.
# Pangkat bawaan (default) GlareMasters Guilds:
# - Master (Ketua Guild)
# - Officer (Wakil/Moderator Guild)
# - Member (Anggota Biasa)
# - Initiate (Anggota Baru)
# (Case-Sensitive, sesuaikan dengan nama pangkat jika Anda mengubahnya di config plugin Guilds)
guild-rank-requirements:
  # Pangkat yang boleh menyerang wilayah (/war info -> Deklarasi Perang)
  declare-war:
    - "Master"
    - "Officer"
  # Pangkat yang boleh menyimpan/mengubah banner wilayah (/war banner)
  modify-banner:
    - "Master"

# ┌──────────────────────────────────────────────────┐
# │              PENGATURAN DISCORD WEBHOOK          │
# └──────────────────────────────────────────────────┘
discord-webhook:
  enabled: false
  # Mode pengiriman webhook: "embed" (menggunakan tampilan kotak embed) atau "text" (hanya mengirim pesan teks/ping biasa)
  mode: "embed"
  url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL_HERE"
  # Avatar & Username Webhook
  username: "Cyayo Guild War Bot"
  avatar-url: "https://example.com/logo.png"

  # Gaya pesan saat War Dimulai (dapat dinonaktifkan lewat enabled: false)
  on-war-start:
    enabled: false
    title: "⚔️ DEKLARASI PERANG WILAYAH ⚔️"
    color: "#ff3333"
    description: |
      Guild **{attacker}** telah menyatakan perang terhadap wilayah **{territory}**!
      Wilayah ini saat ini dipertahankan oleh Guild **{defender}** (Tier {defender_tier}).
      
      Perang akan segera dimulai di Arena dalam waktu 60 detik!
    footer: "CyayoGuildWar System • Waktu: {time}"
    thumbnail: "https://example.com/swords.png"

  # Gaya pesan saat War Selesai (Kemenangan Attacker)
  on-war-end-win:
    enabled: true
    title: "🏆 WILAYAH BERHASIL DIREBUT! 🏆"
    color: "#33ff33"
    description: |
      Selamat kepada Guild **{attacker}**! 
      Mereka berhasil mengalahkan pertahanan Guild **{defender}** dan kini resmi menguasai wilayah **{territory}**.
      
      **Partisipan Perang:**
      {participants}
      
      Wilayah **{territory}** sekarang memasuki masa perlindungan (cooldown) selama {cooldown} menit.
    footer: "CyayoGuildWar System • Waktu: {time}"
    thumbnail: "https://example.com/trophy.png"

  # Gaya pesan saat War Selesai (Defender Berhasil Mempertahankan)
  on-war-end-fail:
    enabled: true
    title: "🛡️ PERTAHANAN BERHASIL! 🛡️"
    color: "#3399ff"
    description: |
      Guild **{defender}** berhasil mempertahankan wilayah **{territory}** dari serangan Guild **{attacker}**!
      
      Wilayah ini tidak memasuki cooldown dan dapat diserang kembali kapan saja.
    footer: "CyayoGuildWar System • Waktu: {time}"

