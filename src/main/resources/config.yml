  # Simultaneous Attack & Arena Limits
  simultaneous-attack-limit: "&cGuild kamu sudah memiliki {count} serangan teritori aktif! Selesaikan pertempuran sebelumnya terlebih dahulu."
  arenas-full: "&cSemua arena pertempuran sedang digunakan. Silakan tunggu beberapa saat."
