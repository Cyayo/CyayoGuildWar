  admin-give-success: "&aBerhasil mengirimkan &e{amount}x {item} &ake War Vault Guild &b{guild}&a."
  admin-give-received: "&aSeorang admin telah mengirimkan &e{amount}x {item} &ake War Vault Guild kamu!"
  
  # War Vault Reward Deposited Messages
  periodic-reward-vault-deposited: "&aGuild kamu menerima bonus &e{amount}x {item} &adari wilayah &6{territory}&a! Item telah dimasukkan ke War Vault."
  # Set ke true untuk mengaktifkan notifikasi deposit periodik teritori, false untuk mematikan total
  notify-periodic-vault-deposit: true
  # Format notifikasi yang digabung (mencegah spam chat jika banyak item didapat sekaligus)
