  banner-saved: "&aLokasi banner untuk wilayah {region} telah berhasil disimpan!"
  banner-not-looking: "&cKamu harus melihat langsung ke sebuah block banner!"
  banner-replaced: "&aBanner wilayah {region} telah berhasil diganti dengan desain Banner Guild kamu!"
  not-holding-banner: "&cKamu harus memegang item Banner di tangan utama kamu!"
  not-owning-guild: "&cWilayah ini bukan milik Guild kamu!"
  no-guild-rank: "&cPerintah ini hanya dapat digunakan oleh pangkat Guild: {ranks}"
