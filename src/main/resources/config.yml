# ┌──────────────────────────────────────────────────┐
# │              PENGATURAN BOSSBAR COUNTDOWN        │
# └──────────────────────────────────────────────────┘
bossbar:
  # Judul BossBar (Mendukung placeholder {time} dan {territory})
  title: "&c&l⚔️ Persiapan War {territory}: {time} detik! ⚔️"
  # Pilihan warna BossBar: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  color: "RED"
  # Pilihan style BossBar: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  style: "SOLID"


# ┌──────────────────────────────────────────────────┐
# │              PENGATURAN SCOREBOARD WAR (TAB)     │
# └──────────────────────────────────────────────────┘
# Integrasi dengan plugin TAB (oleh NEZNAMY) untuk mengubah Scoreboard saat bertarung di arena
scoreboard:
  enabled: true
  title: "&c&l⚔️ WAR ARENA ⚔️"
  lines:
    - "&7&m-----------------------"
    - "&f Wilayah: &a{territory}"
    - "&f Sisa Waktu: &e{time_left}"
    - ""
    - "&c Regu Penyerang ({attacker_guild}):"
    - "{attacker_players}"
    - ""
    - "&9 Regu Bertahan ({defender_guild}):"
    - "{defender_players}"
    - "&7&m-----------------------"
  player-alive-format: " &8- &e{player}: &c{health} HP"
  player-dead-format: " &8- &7{player}: &7☠ DEAD"

# ┌──────────────────────────────────────────────────┐
# │              PENGATURAN EFEK SUARA (SOUNDS)      │
# └──────────────────────────────────────────────────┘
# Konfigurasi efek suara untuk berbagai event pertempuran teritori.
# Gunakan nama Sound resmi Bukkit (contoh: ENTITY_ENDERMAN_TELEPORT, UI_TOAST_CHALLENGE_COMPLETE)
# Format: "NAMA_SUARA;volume;pitch"
sounds:
  # Saat war dideklarasikan/dimulai persiapan (dikirim ke guild penyerang & bertahan)
  war-declare: "ENTITY_ENDER_DRAGON_GROWL;1.0;0.8"

  # Efek suara detik-detik terakhir hitung mundur persiapan war (5 detik terakhir)
  countdown-tick: "BLOCK_NOTE_BLOCK_PLING;1.0;1.5"

  # Saat persiapan war selesai dan pemain diteleportasi ke arena
  war-teleport: "ENTITY_ENDERMAN_TELEPORT;1.0;1.0"
  
  # Saat pintu arena dibuka / pertarungan dimulai (Raid Horn)
  war-start: "EVENT_RAID_HORN;1.0;1.0"
  
  # Efek suara saat level Strength Sudden Death meningkat
  sudden-death-boost: "ENTITY_LIGHTNING_BOLT_THUNDER;0.8;1.0"
  
  # Saat Guild memenangkan pertempuran (dikirim ke seluruh anggota guild pemenang)
  war-win: "UI_TOAST_CHALLENGE_COMPLETE;1.0;1.0"
  
  # Saat Guild kalah dalam pertempuran (dikirim ke seluruh anggota guild yang kalah)
  war-lose: "ENTITY_WITHER_DEATH;0.8;0.8"

# ┌──────────────────────────────────────────────────┐
# │           SISTEM SEASON RATING (SR) GUILD        │
# └──────────────────────────────────────────────────┘
season-rating:
  enabled: true
  # Interval pembagian poin SR ke guild pemilik wilayah (dalam menit)
  interval-minutes: 10
  # Jumlah poin SR yang didapat per wilayah yang dikuasai secara periodik
  points-per-territory: 5
  # Jumlah poin SR instan yang didapat ketika memenangkan war
  win-war-sr-reward: 25


# ┌──────────────────────────────────────────────────┐
# │           FORMAT PLACEHOLDER (PLACEHOLDERAPI)    │
# └──────────────────────────────────────────────────┘
# Konfigurasi format tampilan untuk placeholder %war_<nama_region>%
placeholder-formats:
  # Mode tampilan nama guild pada placeholder & sistem war
  # Pilihan: "name" (Nama Guild) atau "prefix" (Prefix Guild jika didukung plugin)
  guild-mode: "name"

  # Tampilan jika wilayah belum dikuasai oleh guild mana pun
  unclaimed: "&7Territory ini belum dikuasai"
  
  # Tampilan jika wilayah dikuasai oleh suatu guild (mendukung {owner} dan {tier})
  claimed: "&eTerritory ini dikuasai oleh &b{owner} &e(Tier {tier})"
